naftiko: "1.0.0-alpha1"

info:
  label: "Stack Exchange API"
  description: "Stack Exchange network Q&A API v2.3 for reading questions, answers, comments, users, tags, badges, and performing searches across all Stack Exchange sites."
  tags:
    - Stack Exchange
    - Q&A
    - Questions
    - Answers
    - Developer Community
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STACK_EXCHANGE_ACCESS_TOKEN: STACK_EXCHANGE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: stack-exchange-api
      baseUri: https://api.stackexchange.com/2.3
      description: "Stack Exchange network Q&A API v2.3"
      authentication:
        type: apikey
        key: access_token
        value: "{{STACK_EXCHANGE_ACCESS_TOKEN}}"
        placement: query
      resources:
        - name: questions
          path: /questions
          description: "Stack Exchange questions"
          operations:
            - name: get-questions
              method: GET
              description: "Get questions from a Stack Exchange site"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: tagged
                  in: query
                  type: string
                  required: false
                  description: "Semicolon-delimited tags to filter by"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field (activity, creation, votes, hot, week, month)"
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Sort order (asc, desc)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pagesize
                  in: query
                  type: integer
                  required: false
                  description: "Items per page (max 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-unanswered-questions
              method: GET
              description: "Get unanswered questions from a Stack Exchange site"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: tagged
                  in: query
                  type: string
                  required: false
                  description: "Filter by tags"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: questions-by-id
          path: /questions/{ids}
          description: "Stack Exchange questions by ID"
          operations:
            - name: get-questions-by-ids
              method: GET
              description: "Get specific questions by semicolon-delimited IDs"
              inputParameters:
                - name: ids
                  in: path
                  type: string
                  required: true
                  description: "Semicolon-delimited question IDs"
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: answers
          path: /answers
          description: "Stack Exchange answers"
          operations:
            - name: get-answers
              method: GET
              description: "Get all answers from a Stack Exchange site"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search
          path: /search
          description: "Search Stack Exchange questions"
          operations:
            - name: search-questions
              method: GET
              description: "Search questions by title text and tags"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: intitle
                  in: query
                  type: string
                  required: false
                  description: "Text to search in question titles"
                - name: tagged
                  in: query
                  type: string
                  required: false
                  description: "Filter by tags"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search-advanced
          path: /search/advanced
          description: "Advanced search of Stack Exchange questions"
          operations:
            - name: search-advanced
              method: GET
              description: "Advanced question search with filtering by accepted status, body, tags, and user"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Full-text search query"
                - name: tagged
                  in: query
                  type: string
                  required: false
                  description: "Filter by tags"
                - name: accepted
                  in: query
                  type: boolean
                  required: false
                  description: "Filter for questions with accepted answers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: "Stack Exchange users"
          operations:
            - name: get-users
              method: GET
              description: "Get users from a Stack Exchange site"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: inname
                  in: query
                  type: string
                  required: false
                  description: "Filter by display name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tags
          path: /tags
          description: "Stack Exchange tags"
          operations:
            - name: get-tags
              method: GET
              description: "Get tags from a Stack Exchange site"
              inputParameters:
                - name: site
                  in: query
                  type: string
                  required: true
                  description: "Stack Exchange site identifier"
                - name: inname
                  in: query
                  type: string
                  required: false
                  description: "Filter by tag name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sites
          path: /sites
          description: "Stack Exchange network sites"
          operations:
            - name: get-sites
              method: GET
              description: "Get all sites in the Stack Exchange network"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stack-exchange-api
      resources:
        - path: /v1/questions
          name: questions
          operations:
            - method: GET
              name: get-questions
              description: "Get questions from Stack Exchange"
              call: "stack-exchange-api.get-questions"
              with:
                site: "rest.site"
                tagged: "rest.tagged"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/search
          name: search
          operations:
            - method: GET
              name: search-questions
              description: "Search Stack Exchange questions"
              call: "stack-exchange-api.search-questions"
              with:
                site: "rest.site"
                intitle: "rest.intitle"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stack-exchange-mcp
      transport: http
      tools:
        - name: get-stack-exchange-questions
          description: "Get questions from a Stack Exchange network site (stackoverflow, serverfault, etc.)"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.get-questions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-unanswered-questions
          description: "Get questions that have no upvoted answers on a Stack Exchange site"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.get-unanswered-questions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-stack-exchange-questions
          description: "Search Stack Exchange questions by title text and tags"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.search-questions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: advanced-search-stack-exchange
          description: "Advanced search of Stack Exchange questions with filters for acceptance, body, views, and user"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.search-advanced"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stack-exchange-users
          description: "Get users from a Stack Exchange site, optionally filtered by display name"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.get-users"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stack-exchange-tags
          description: "Get tags from a Stack Exchange site"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.get-tags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stack-exchange-sites
          description: "Get all sites in the Stack Exchange network"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-exchange-api.get-sites"
          outputParameters:
            - type: object
              mapping: "$."
